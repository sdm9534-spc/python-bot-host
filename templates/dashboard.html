<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Host - لوحة التحكم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header .logo {
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header .user-info span {
            color: #aaa;
        }
        
        .btn-logout {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9em;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .welcome-card h2 { font-size: 2em; margin-bottom: 10px; }
        .welcome-card p { color: #aaa; }
        
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .upload-area {
            border: 3px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .upload-area .icon { font-size: 4em; margin-bottom: 15px; }
        .upload-area .text { font-size: 1.3em; margin-bottom: 8px; }
        .upload-area .hint { color: #aaa; }
        
        #file-input { display: none; }
        
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 20px;
            border-radius: 10px;
        }
        
        .option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
        }
        
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 0 auto;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: #fff;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .console {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 25px;
            display: none;
        }
        
        .console-header {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .console-header .title { display: flex; align-items: center; gap: 10px; }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff9800;
        }
        
        .status-dot.running { background: #4CAF50; }
        .status-dot.error { background: #f44336; }
        .status-dot.completed { background: #2196F3; }
        
        .console-controls { display: flex; gap: 10px; }
        
        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        
        .ctrl-btn.run { background: #4CAF50; }
        .ctrl-btn.stop { background: #f44336; }
        .ctrl-btn.clear { background: #ff9800; }
        
        .console-output {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .output-line { color: #d4d4d4; }
        .error-line { color: #f48771; }
        .success-line { color: #4CAF50; }
        .info-line { color: #2196F3; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚡ Flex Host</div>
        <div class="user-info">
            <span>📧 {{ user.email }}</span>
            <a href="{{ url_for('logout') }}" class="btn-logout">🚪 خروج</a>
        </div>
    </div>
    
    <div class="container">
        <div class="welcome-card">
            <h2>👋 مرحباً بك في لوحة التحكم</h2>
            <p>ارفع بوت Python وشغله مباشرة - جميع المكتبات مدعومة</p>
        </div>
        
        <div class="main-card">
            <div class="upload-area" id="upload-area">
                <div class="icon">📁</div>
                <div class="text">اسحب وأفلت ملف البوت هنا</div>
                <div class="hint">أو انقر للاختيار - Python فقط (.py)</div>
                <input type="file" id="file-input" accept=".py">
            </div>
            
            <div class="options">
                <div class="option">
                    <input type="checkbox" id="auto-run" checked>
                    <label for="auto-run">تشغيل تلقائي</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="install-deps" checked>
                    <label for="install-deps">تثبيت المكتبات تلقائياً</label>
                </div>
            </div>
            
            <button class="btn btn-primary" id="upload-btn" disabled>
                ⚡ ارفع وشغل البوت
            </button>
            
            <div class="console" id="console">
                <div class="console-header">
                    <div class="title">
                        <span class="status-dot" id="status-dot"></span>
                        <span>Console Output</span>
                    </div>
                    <div class="console-controls">
                        <button class="ctrl-btn run" id="run-btn" style="display:none;">▶ تشغيل</button>
                        <button class="ctrl-btn stop" id="stop-btn" style="display:none;">⏹ إيقاف</button>
                        <button class="ctrl-btn clear" id="clear-btn">🧹 تنظيف</button>
                    </div>
                </div>
                <div class="console-output" id="console-output">
                    <span class="info-line">📋 في انتظار رفع الملف...</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentTaskId = localStorage.getItem('flex_taskId') || null;
        let eventSource = null;
        let selectedFile = null;
        
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const consoleDiv = document.getElementById('console');
        const consoleOutput = document.getElementById('console-output');
        const statusDot = document.getElementById('status-dot');
        const runBtn = document.getElementById('run-btn');
        const stopBtn = document.getElementById('stop-btn');
        const clearBtn = document.getElementById('clear-btn');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#4CAF50'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'rgba(255,255,255,0.3)'; });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'rgba(255,255,255,0.3)';
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            if (!file.name.endsWith('.py')) { alert('❌ ملف Python فقط'); return; }
            selectedFile = file;
            uploadBtn.disabled = false;
            uploadArea.querySelector('.icon').textContent = '🐍';
            uploadArea.querySelector('.text').textContent = file.name;
            uploadArea.querySelector('.hint').textContent = formatSize(file.size);
        }
        
        function formatSize(bytes) {
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ جاري الرفع...';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('auto_run', document.getElementById('auto-run').checked);
            
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (res.ok) {
                    currentTaskId = data.task_id;
                    localStorage.setItem('flex_taskId', currentTaskId);
                    
                    consoleDiv.style.display = 'block';
                    consoleOutput.innerHTML = '';
                    startStream(currentTaskId);
                    
                    uploadBtn.textContent = '✅ تم الرفع';
                    statusDot.className = 'status-dot running';
                    
                    if (!document.getElementById('auto-run').checked) runBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'inline-block';
                } else {
                    alert('❌ ' + (data.error || 'خطأ'));
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '⚡ ارفع وشغل البوت';
                }
            } catch (err) {
                alert('❌ فشل: ' + err.message);
                uploadBtn.disabled = false;
                uploadBtn.textContent = '⚡ ارفع وشغل البوت';
            }
        });
        
        function startStream(taskId) {
            if (eventSource) eventSource.close();
            eventSource = new EventSource(`/output/${taskId}`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'output') addLine(data.text, 'output-line');
                else if (data.type === 'error') addLine(data.text, 'error-line');
                else if (data.type === 'complete') {
                    addLine('═'.repeat(50), 'info-line');
                    if (data.success) { addLine('✅ تم بنجاح', 'success-line'); statusDot.className = 'status-dot completed'; }
                    else { addLine('❌ انتهى مع أخطاء', 'error-line'); statusDot.className = 'status-dot error'; }
                    stopBtn.style.display = 'none';
                    runBtn.style.display = 'inline-block';
                    eventSource.close();
                }
                
                if (data.running) statusDot.className = 'status-dot running';
            };
            
            eventSource.onerror = () => console.log('انقطع الاتصال');
        }
        
        function addLine(text, cls = 'output-line') {
            const div = document.createElement('div');
            div.className = cls;
            div.textContent = text;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        runBtn.addEventListener('click', async () => {
            if (!currentTaskId) return;
            try {
                const res = await fetch(`/run/${currentTaskId}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    consoleOutput.innerHTML = '';
                    startStream(currentTaskId);
                    runBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                    statusDot.className = 'status-dot running';
                } else {
                    alert('❌ ' + (data.error || 'خطأ'));
                }
            } catch (err) { alert('❌ ' + err.message); }
        });
        
        stopBtn.addEventListener('click', async () => {
            if (!currentTaskId || !confirm('إيقاف البوت؟')) return;
            try {
                const res = await fetch(`/stop/${currentTaskId}`, { method: 'POST' });
                if (res.ok) {
                    addLine('\n⛔ تم الإيقاف', 'error-line');
                    statusDot.className = 'status-dot error';
                    stopBtn.style.display = 'none';
                    runBtn.style.display = 'inline-block';
                    if (eventSource) eventSource.close();
                }
            } catch (err) { alert('❌ ' + err.message); }
        });
        
        clearBtn.addEventListener('click', () => {
            currentTaskId = null;
            localStorage.removeItem('flex_taskId');
            selectedFile = null;
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⚡ ارفع وشغل البوت';
            consoleDiv.style.display = 'none';
            consoleOutput.innerHTML = '<span class="info-line">📋 في انتظار رفع الملف...</span>';
            statusDot.className = 'status-dot';
            runBtn.style.display = 'none';
            stopBtn.style.display = 'none';
            uploadArea.querySelector('.icon').textContent = '📁';
            uploadArea.querySelector('.text').textContent = 'اسحب وأفلت ملف البوت هنا';
            uploadArea.querySelector('.hint').textContent = 'أو انقر للاختيار - Python فقط (.py)';
            if (eventSource) { eventSource.close(); eventSource = null; }
        });
    </script>
</body>
</html>
