<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Host - لوحة التحكم</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #00c853;
            --danger: #ff1744;
            --warning: #ff9100;
            --info: #00b0ff;
            --dark: #0a0a1a;
            --darker: #050510;
            --card: rgba(255,255,255,0.03);
            --card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text: #e0e0e0;
            --text-secondary: #9e9e9e;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            color: var(--text);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(102,126,234,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(118,75,162,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0,200,83,0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        /* ========== Header ========== */
        .header {
            background: rgba(10,10,26,0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4em;
            box-shadow: 0 0 20px rgba(102,126,234,0.3);
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(102,126,234,0.3); }
            50% { box-shadow: 0 0 35px rgba(102,126,234,0.6); }
        }

        .logo-text {
            font-size: 1.5em; font-weight: 900;
            background: linear-gradient(135deg, #667eea, #e0e0e0, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge-pro {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000; padding: 3px 10px; border-radius: 15px;
            font-size: 0.7em; font-weight: 800; letter-spacing: 0.5px;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.75; }
        }

        .header-right { display: flex; align-items: center; gap: 14px; }
        
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: var(--card); padding: 7px 16px;
            border-radius: 25px; border: 1px solid var(--border);
            transition: var(--transition);
        }
        .user-badge:hover { border-color: var(--border-hover); background: var(--card-hover); }

        .user-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85em; font-weight: 700; color: #fff;
        }

        .user-email { 
            font-size: 0.88em; max-width: 170px; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
        }

        .btn-logout {
            background: transparent; border: 1px solid rgba(255,23,68,0.4);
            color: var(--danger); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; text-decoration: none; font-size: 0.85em; font-weight: 600;
            transition: var(--transition); display: flex; align-items: center; gap: 6px;
        }
        .btn-logout:hover { 
            background: rgba(255,23,68,0.1); 
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(255,23,68,0.15);
            transform: translateY(-1px);
        }

        /* ========== Container ========== */
        .container { max-width: 1300px; margin: 0 auto; padding: 20px 20px 30px; }

        /* ========== Stats Bar ========== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--border-hover);
        }

        .stat-card .stat-icon { font-size: 1.8em; margin-bottom: 8px; }
        .stat-card .stat-value { 
            font-size: 1.8em; font-weight: 900;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stat-card .stat-label { color: var(--text-secondary); font-size: 0.82em; margin-top: 4px; }

        /* ========== Toolbar ========== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
            gap: 14px;
            position: relative;
        }

        .toolbar-left { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
            flex: 1;
        }

        .toolbar-right { position: relative; flex-shrink: 0; }

        .btn-tool {
            padding: 10px 18px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            user-select: none;
        }

        .btn-tool:hover { 
            border-color: var(--border-hover); 
            background: var(--card-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-tool:active { transform: scale(0.97); }

        .btn-tool.upload { 
            background: rgba(102,126,234,0.12); 
            border-color: rgba(102,126,234,0.35); 
            color: #aab4ff; 
        }
        .btn-tool.upload:hover { 
            background: rgba(102,126,234,0.2); 
            box-shadow: 0 0 25px rgba(102,126,234,0.2);
        }

        .btn-tool.run-all { 
            background: rgba(0,200,83,0.08); 
            border-color: rgba(0,200,83,0.25); 
            color: var(--success); 
        }
        .btn-tool.run-all:hover { 
            background: rgba(0,200,83,0.15); 
            box-shadow: 0 0 25px rgba(0,200,83,0.2);
        }

        .btn-tool.stop-all { 
            background: rgba(255,145,0,0.08); 
            border-color: rgba(255,145,0,0.25); 
            color: var(--warning); 
        }
        .btn-tool.stop-all:hover { 
            background: rgba(255,145,0,0.15); 
            box-shadow: 0 0 25px rgba(255,145,0,0.2);
        }

        .btn-tool.delete-all { 
            background: rgba(255,23,68,0.08); 
            border-color: rgba(255,23,68,0.25); 
            color: var(--danger); 
        }
        .btn-tool.delete-all:hover { 
            background: rgba(255,23,68,0.15); 
            box-shadow: 0 0 25px rgba(255,23,68,0.2);
        }

        /* ========== Menu Button ========== */
        .btn-menu {
            padding: 10px 15px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.3em;
            transition: var(--transition);
            line-height: 1;
        }
        .btn-menu:hover { 
            border-color: var(--border-hover); 
            background: var(--card-hover);
        }
        .btn-menu.active { 
            background: rgba(102,126,234,0.15); 
            border-color: var(--primary); 
            color: #aab4ff;
        }

        /* ========== Dropdown Menu ========== */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: #15152a;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px;
            min-width: 170px;
            display: none;
            z-index: 999;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
        }
        .dropdown-menu.show { 
            display: block; 
            animation: dropdownIn 0.2s ease;
        }

        @keyframes dropdownIn { 
            from { opacity: 0; transform: translateY(-8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9em;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            user-select: none;
        }
        .dropdown-item:hover { background: rgba(102,126,234,0.12); }
        .dropdown-item.active { 
            background: rgba(102,126,234,0.18); 
            color: #aab4ff; 
        }
        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 6px 0;
        }

        /* ========== Content Area ========== */
        .content-area {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
            min-height: 450px;
            max-height: 550px;
            overflow-y: auto;
            transition: var(--transition);
            position: relative;
        }

        /* ========== Files View ========== */
        .files-view { display: none; }
        .files-view.active { display: block; }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            margin: 3px 0;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: var(--transition);
            cursor: pointer;
            user-select: none;
            position: relative;
            background: transparent;
        }

        .file-item:hover { 
            background: var(--card-hover); 
            border-color: var(--border); 
        }

        .file-item:active { 
            background: rgba(102,126,234,0.06); 
            transform: scale(0.99);
        }

        .file-item-left { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            flex: 1;
        }

        .file-icon { 
            font-size: 1.6em; 
            transition: var(--transition);
        }

        .file-item:hover .file-icon { transform: scale(1.1); }

        .file-info { display: flex; flex-direction: column; gap: 2px; }

        .file-name { font-weight: 600; font-size: 0.95em; }

        .file-meta {
            font-size: 0.75em;
            color: var(--text-secondary);
        }

        .file-status {
            font-size: 0.75em;
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: 600;
            transition: var(--transition);
        }

        .file-status.running { 
            background: rgba(0,200,83,0.12); 
            color: var(--success); 
            animation: statusPulse 2s infinite;
        }

        .file-status.stopped { 
            background: rgba(255,255,255,0.04); 
            color: var(--text-secondary); 
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .delete-btn {
            display: none;
            position: absolute;
            left: 14px;
            background: rgba(255,23,68,0.2);
            color: var(--danger);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9em;
            transition: var(--transition);
            z-index: 10;
        }

        .file-item.show-delete .delete-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            animation: popIn 0.2s ease;
        }

        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .delete-btn:hover { 
            background: rgba(255,23,68,0.4); 
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,23,68,0.3);
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: var(--text-secondary);
        }

        .empty-state .empty-icon { 
            font-size: 5em; 
            margin-bottom: 16px; 
            opacity: 0.6;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .empty-state .empty-text { font-size: 1.2em; font-weight: 600; margin-bottom: 6px; }
        .empty-state .empty-hint { font-size: 0.88em; opacity: 0.7; }

        /* ========== Console View ========== */
        .console-view { display: none; }
        .console-view.active { display: block; }

        .console-output {
            background: #0a0a15;
            border-radius: 12px;
            padding: 18px 20px;
            font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
            font-size: 0.84em;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 480px;
            overflow-y: auto;
            color: #c0c0c0;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .console-output .error-line { 
            color: #ff6b6b; 
            background: rgba(255,23,68,0.04); 
            padding: 2px 6px; 
            border-radius: 4px; 
        }
        .console-output .success-line { color: #69f0ae; }
        .console-output .info-line { color: #40c4ff; }
        .console-output .warning-line { color: #ffd740; }

        .console-empty { 
            text-align: center; 
            padding: 70px 20px; 
            color: var(--text-secondary); 
        }

        .console-empty .console-icon { font-size: 3em; margin-bottom: 12px; opacity: 0.5; }

        /* ========== Toast ========== */
        .toast-container { 
            position: fixed; top: 20px; right: 20px; 
            z-index: 9999; display: flex; flex-direction: column; gap: 8px; 
        }

        .toast {
            padding: 13px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 0.85em;
            animation: toastIn 0.35s ease, toastOut 0.35s ease 2.8s forwards;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            max-width: 380px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast-success { background: linear-gradient(135deg, #00c853, #00e676); }
        .toast-error { background: linear-gradient(135deg, #d50000, #ff1744); }
        .toast-info { background: linear-gradient(135deg, #0091ea, #00b0ff); }
        .toast-warning { background: linear-gradient(135deg, #ff6d00, #ff9100); }

        @keyframes toastIn { 
            from { transform: translateX(120%); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        @keyframes toastOut { 
            from { opacity: 1; } 
            to { opacity: 0; transform: translateX(50px); } 
        }

        #file-input { display: none; }

        /* ========== Responsive ========== */
        @media (max-width: 900px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .header { padding: 10px 14px; }
            .user-email { max-width: 100px; font-size: 0.78em; }
            .logo-text { font-size: 1.2em; }
            
            .toolbar { flex-direction: column; }
            .toolbar-left { gap: 6px; }
            .toolbar-right { align-self: flex-end; }
            
            .btn-tool { padding: 8px 12px; font-size: 0.78em; gap: 5px; }
            .btn-menu { padding: 8px 12px; font-size: 1.1em; }
            
            .content-area { max-height: 400px; min-height: 350px; }
            .stats-bar { gap: 8px; }
            .stat-card { padding: 12px 14px; }
            .stat-card .stat-value { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">Flex Host</span>
            <span class="badge-pro">PRO</span>
        </div>
        <div class="header-right">
            <div class="user-badge">
                <div class="user-avatar">{{ user.email[0].upper() }}</div>
                <span class="user-email">{{ user.email }}</span>
            </div>
            <a href="{{ url_for('logout') }}" class="btn-logout">🚪 خروج</a>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">إجمالي الملفات</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-value" id="stat-running">0</div>
                <div class="stat-label">بوتات شغالة</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏸️</div>
                <div class="stat-value" id="stat-stopped">0</div>
                <div class="stat-label">بوتات متوقفة</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💾</div>
                <div class="stat-value" id="stat-storage">--</div>
                <div class="stat-label">المساحة</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-tool upload" onclick="document.getElementById('file-input').click()">
                    ⬆️ رفع ملف
                </button>
                <input type="file" id="file-input" accept=".py" multiple>
                
                <button class="btn-tool run-all" id="btn-run-all" onclick="runAllFiles()">
                    ▶️ تشغيل الكل
                </button>
                <button class="btn-tool stop-all" id="btn-stop-all" onclick="stopAllFiles()">
                    ⏹ إيقاف الكل
                </button>
                <button class="btn-tool delete-all" id="btn-delete-all" onclick="deleteAllFiles()">
                    🗑️ حذف الكل
                </button>
            </div>
            <div class="toolbar-right">
                <button class="btn-menu" id="btn-menu" onclick="toggleMenu()" title="القائمة">☰</button>
                <div class="dropdown-menu" id="dropdown-menu">
                    <div class="dropdown-item active" id="menu-files" onclick="switchView('files')">
                        📁 الملفات
                    </div>
                    <div class="dropdown-item" id="menu-console" onclick="switchView('console')">
                        📋 Console
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area" id="content-area">
            <!-- Files View -->
            <div class="files-view active" id="files-view">
                <div class="empty-state" id="files-empty">
                    <div class="empty-icon">📂</div>
                    <div class="empty-text">لا توجد ملفات</div>
                    <div class="empty-hint">اضغط ⬆️ رفع ملف للبدء</div>
                </div>
                <div id="files-list"></div>
            </div>

            <!-- Console View -->
            <div class="console-view" id="console-view">
                <div class="console-output" id="console-output">
                    <span class="info-line">📋 Console جاهز... في انتظار تشغيل ملف</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== Global State ==========
        let userFiles = [];
        let activeTasks = {};
        let currentView = 'files';
        let eventSource = null;
        let longPressTimer = null;
        let currentConsoleTask = null;

        // ========== DOM Elements ==========
        const filesView = document.getElementById('files-view');
        const consoleView = document.getElementById('console-view');
        const filesList = document.getElementById('files-list');
        const filesEmpty = document.getElementById('files-empty');
        const consoleOutput = document.getElementById('console-output');
        const dropdownMenu = document.getElementById('dropdown-menu');
        const btnMenu = document.getElementById('btn-menu');
        const menuFiles = document.getElementById('menu-files');
        const menuConsole = document.getElementById('menu-console');
        const contentArea = document.getElementById('content-area');

        // ========== Toast System ==========
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            toast.innerHTML = `<span>${icons[type] || ''}</span> ${message}`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(50px)';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 2800);
        }

        // ========== Menu System ==========
        function toggleMenu() {
            const isOpen = dropdownMenu.classList.contains('show');
            if (isOpen) {
                closeMenu();
            } else {
                dropdownMenu.classList.add('show');
                btnMenu.classList.add('active');
            }
        }

        function closeMenu() {
            dropdownMenu.classList.remove('show');
            btnMenu.classList.remove('active');
        }

        document.addEventListener('click', (e) => {
            if (!btnMenu.contains(e.target) && !dropdownMenu.contains(e.target)) {
                closeMenu();
            }
        });

        // Close menu on ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMenu();
        });

        // ========== View Switching ==========
        function switchView(view) {
            currentView = view;
            closeMenu();

            if (view === 'files') {
                filesView.classList.add('active');
                consoleView.classList.remove('active');
                menuFiles.classList.add('active');
                menuConsole.classList.remove('active');
                
                // Stop console stream
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                }
                currentConsoleTask = null;
                
                loadUserFiles();
            } else {
                filesView.classList.remove('active');
                consoleView.classList.add('active');
                menuFiles.classList.remove('active');
                menuConsole.classList.add('active');
            }
        }

        // ========== Stats Update ==========
        function updateStats() {
            const total = userFiles.length;
            const running = Object.keys(activeTasks).length;
            const stopped = total - running;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-running').textContent = running;
            document.getElementById('stat-stopped').textContent = stopped;
            
            // Calculate storage
            let totalSize = 0;
            userFiles.forEach(f => { totalSize += (f.size || 0); });
            
            if (totalSize === 0) {
                document.getElementById('stat-storage').textContent = '0 KB';
            } else if (totalSize < 1024) {
                document.getElementById('stat-storage').textContent = totalSize + ' B';
            } else if (totalSize < 1024 * 1024) {
                document.getElementById('stat-storage').textContent = (totalSize / 1024).toFixed(1) + ' KB';
            } else {
                document.getElementById('stat-storage').textContent = (totalSize / (1024 * 1024)).toFixed(1) + ' MB';
            }
        }

        // ========== File Upload ==========
        document.getElementById('file-input').addEventListener('change', async function() {
            const files = this.files;
            if (!files.length) return;

            let uploaded = 0;
            
            for (let file of files) {
                if (!file.name.endsWith('.py')) {
                    showToast(`${file.name} - يجب أن يكون ملف Python`, 'error');
                    continue;
                }

                const formData = new FormData();
                formData.append('file', file);
                formData.append('auto_run', 'false');

                try {
                    const res = await fetch('/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    if (res.ok) {
                        uploaded++;
                    } else {
                        showToast(`${file.name}: ${data.error}`, 'error');
                    }
                } catch (err) {
                    showToast(`فشل رفع ${file.name}`, 'error');
                }
            }

            this.value = '';
            
            if (uploaded > 0) {
                showToast(`تم رفع ${uploaded} ملف بنجاح`, 'success');
            }
            
            await loadUserFiles();
        });

        // ========== Load Files ==========
        async function loadUserFiles() {
            try {
                const res = await fetch('/user-files');
                const data = await res.json();
                
                if (res.ok) {
                    userFiles = data.files || [];
                    activeTasks = data.active_tasks || {};
                    renderFiles();
                    updateStats();
                }
            } catch (err) {
                console.error('فشل تحميل الملفات:', err);
            }
        }

        // ========== Render Files ==========
        function renderFiles() {
            if (!userFiles.length) {
                filesList.innerHTML = '';
                filesEmpty.style.display = 'block';
                return;
            }

            filesEmpty.style.display = 'none';
            
            filesList.innerHTML = userFiles.map((f, index) => {
                const isRunning = activeTasks[f.task_id] === true;
                const statusClass = isRunning ? 'running' : 'stopped';
                const statusText = isRunning ? '🟢 شغال' : '⏸️ متوقف';
                
                return `
                    <div class="file-item" id="file-${index}" 
                         oncontextmenu="return false;"
                         onmousedown="startLongPress(${index}, event)"
                         onmouseup="cancelLongPress()"
                         onmouseleave="cancelLongPress()"
                         ontouchstart="startLongPress(${index}, event)"
                         ontouchend="cancelLongPress()"
                         ontouchmove="cancelLongPress()">
                        <div class="file-item-left">
                            <span class="file-icon">🐍</span>
                            <div class="file-info">
                                <span class="file-name">${escapeHtml(f.name)}</span>
                                <span class="file-meta">${f.size_formatted || ''}</span>
                            </div>
                        </div>
                        <span class="file-status ${statusClass}">${statusText}</span>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteFile('${f.task_id}', ${index})" title="حذف">
                            🗑️
                        </button>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== Long Press for Delete ==========
        function startLongPress(index, event) {
            // Prevent on right click
            if (event.type === 'mousedown' && event.button === 2) return;
            
            cancelLongPress();
            
            longPressTimer = setTimeout(() => {
                // Hide all other delete buttons
                document.querySelectorAll('.file-item.show-delete').forEach(el => {
                    el.classList.remove('show-delete');
                });
                
                // Show delete button for this file
                const fileItem = document.getElementById(`file-${index}`);
                if (fileItem) {
                    fileItem.classList.add('show-delete');
                    // Haptic feedback if available
                    if (navigator.vibrate) {
                        navigator.vibrate(50);
                    }
                }
            }, 700); // 700ms long press
        }

        function cancelLongPress() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        // Click outside to hide delete buttons
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.file-item')) {
                document.querySelectorAll('.file-item.show-delete').forEach(el => {
                    el.classList.remove('show-delete');
                });
            }
        });

        // ========== Delete Single File ==========
        async function deleteFile(taskId, index) {
            if (!confirm(`🗑️ هل أنت متأكد من حذف "${userFiles[index]?.name}"؟`)) return;

            // Stop if running
            if (activeTasks[taskId]) {
                try {
                    await fetch(`/stop/${taskId}`, { method: 'POST' });
                    delete activeTasks[taskId];
                } catch (err) {}
            }

            try {
                const res = await fetch(`/delete-file/${taskId}`, { method: 'POST' });
                const data = await res.json();
                
                if (res.ok) {
                    userFiles.splice(index, 1);
                    renderFiles();
                    updateStats();
                    showToast('تم حذف الملف بنجاح', 'success');
                } else {
                    showToast('فشل حذف الملف', 'error');
                }
            } catch (err) {
                showToast('خطأ في الحذف', 'error');
            }
        }

        // ========== Run All ==========
        async function runAllFiles() {
            if (!userFiles.length) {
                showToast('لا توجد ملفات للتشغيل', 'warning');
                return;
            }

            let started = 0;
            let alreadyRunning = 0;

            for (let f of userFiles) {
                if (activeTasks[f.task_id]) {
                    alreadyRunning++;
                    continue;
                }

                try {
                    const res = await fetch(`/run/${f.task_id}`, { method: 'POST' });
                    if (res.ok) {
                        activeTasks[f.task_id] = true;
                        started++;
                    }
                } catch (err) {
                    console.error('فشل تشغيل:', f.name);
                }
            }

            renderFiles();
            updateStats();

            if (started > 0) {
                showToast(`تم تشغيل ${started} بوت بنجاح`, 'success');
            } else if (alreadyRunning > 0) {
                showToast(`جميع الملفات شغالة بالفعل (${alreadyRunning})`, 'info');
            } else {
                showToast('فشل تشغيل الملفات', 'error');
            }
        }

        // ========== Stop All ==========
        async function stopAllFiles() {
            const runningCount = Object.keys(activeTasks).length;
            
            if (!runningCount) {
                showToast('لا توجد بوتات شغالة', 'warning');
                return;
            }

            if (!confirm(`⚠️ إيقاف ${runningCount} بوت شغال؟`)) return;

            let stopped = 0;

            for (let f of userFiles) {
                if (activeTasks[f.task_id]) {
                    try {
                        const res = await fetch(`/stop/${f.task_id}`, { method: 'POST' });
                        if (res.ok) {
                            delete activeTasks[f.task_id];
                            stopped++;
                        }
                    } catch (err) {
                        console.error('فشل إيقاف:', f.name);
                    }
                }
            }

            // Also call stop-all endpoint
            try {
                await fetch('/stop-all', { method: 'POST' });
            } catch (err) {}

            // Clear all active tasks
            activeTasks = {};
            
            renderFiles();
            updateStats();
            
            if (stopped > 0) {
                showToast(`تم إيقاف ${stopped} بوت`, 'warning');
            }
        }

        // ========== Delete All ==========
        async function deleteAllFiles() {
            if (!userFiles.length) {
                showToast('لا توجد ملفات للحذف', 'warning');
                return;
            }

            if (!confirm(`⚠️ تحذير: سيتم حذف جميع الملفات (${userFiles.length} ملف) بشكل نهائي!\nهل أنت متأكد؟`)) return;

            // Stop all first
            for (let f of userFiles) {
                if (activeTasks[f.task_id]) {
                    try {
                        await fetch(`/stop/${f.task_id}`, { method: 'POST' });
                    } catch (err) {}
                }
            }

            let deleted = 0;

            for (let f of [...userFiles]) {
                try {
                    const res = await fetch(`/delete-file/${f.task_id}`, { method: 'POST' });
                    if (res.ok) deleted++;
                } catch (err) {
                    console.error('فشل حذف:', f.name);
                }
            }

            userFiles = [];
            activeTasks = {};
            
            renderFiles();
            updateStats();
            
            showToast(`تم حذف ${deleted} ملف`, 'success');
        }

        // ========== Stream Console ==========
        function startConsoleStream(taskId) {
            if (eventSource) {
                eventSource.close();
            }
            
            currentConsoleTask = taskId;
            consoleOutput.innerHTML = '';
            
            eventSource = new EventSource(`/output/${taskId}`);
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'output') {
                        appendConsoleLine(data.text, '');
                    } else if (data.type === 'error') {
                        appendConsoleLine(data.text, 'error-line');
                    } else if (data.type === 'complete') {
                        if (data.success) {
                            appendConsoleLine('✅ اكتمل التشغيل بنجاح', 'success-line');
                        } else {
                            appendConsoleLine('❌ انتهى التشغيل مع أخطاء', 'error-line');
                        }
                        eventSource.close();
                        eventSource = null;
                    }
                } catch (e) {}
            };
            
            eventSource.onerror = () => {
                console.log('Console stream disconnected');
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                }
            };
        }

        function appendConsoleLine(text, className) {
            const line = document.createElement('div');
            line.className = className;
            line.textContent = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
            
            // Limit lines
            while (consoleOutput.children.length > 1000) {
                consoleOutput.removeChild(consoleOutput.firstChild);
            }
        }

        // ========== Keyboard Shortcuts ==========
        document.addEventListener('keydown', (e) => {
            // Ctrl+Shift+U = Upload
            if (e.ctrlKey && e.shiftKey && e.key === 'U') {
                e.preventDefault();
                document.getElementById('file-input').click();
            }
            // Ctrl+Shift+R = Run All
            if (e.ctrlKey && e.shiftKey && e.key === 'R') {
                e.preventDefault();
                runAllFiles();
            }
            // Ctrl+Shift+S = Stop All
            if (e.ctrlKey && e.shiftKey && e.key === 'S') {
                e.preventDefault();
                stopAllFiles();
            }
            // Ctrl+Shift+D = Delete All
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                e.preventDefault();
                deleteAllFiles();
            }
            // Ctrl+` = Toggle Console/Files
            if (e.ctrlKey && e.key === '`') {
                e.preventDefault();
                switchView(currentView === 'files' ? 'console' : 'files');
            }
        });

        // ========== Auto Refresh ==========
        // Refresh file list every 15 seconds
        setInterval(async () => {
            if (currentView === 'files') {
                try {
                    const res = await fetch('/user-files');
                    const data = await res.json();
                    if (res.ok) {
                        const oldActiveCount = Object.keys(activeTasks).length;
                        activeTasks = data.active_tasks || {};
                        const newActiveCount = Object.keys(activeTasks).length;
                        
                        // Only re-render if active tasks changed
                        if (oldActiveCount !== newActiveCount) {
                            renderFiles();
                            updateStats();
                        }
                    }
                } catch (err) {}
            }
        }, 15000);

        // ========== Init ==========
        async function init() {
            await loadUserFiles();
            updateStats();
            
            console.log('%c⚡ Flex Host Pro %cReady',
                'color: #667eea; font-size: 1.3em; font-weight: bold;',
                'color: #aaa;');
            console.log('%c🖥️ Ctrl+Shift+U رفع | Ctrl+Shift+R تشغيل | Ctrl+Shift+S إيقاف | Ctrl+` تبديل العرض',
                'color: #764ba2; font-size: 0.85em;');
        }

        init();
    </script>
</body>
    </html>
