<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Python Bot Host - استضافة بوتات بايثون</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .upload-area {
            border: 3px dashed rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 60px 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
            position: relative;
        }

        .upload-area:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.02);
        }

        .upload-area.dragover {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 1em;
            opacity: 0.7;
        }

        #file-input {
            display: none;
        }

        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .option-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
        }

        .option-group label {
            font-size: 1.1em;
            cursor: pointer;
        }

        .option-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #4CAF50;
        }

        .upload-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }

        .upload-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .console {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            display: none;
        }

        .console-header {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-title {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff9800;
            display: inline-block;
        }

        .status-dot.running { background: #4CAF50; }
        .status-dot.error { background: #f44336; }
        .status-dot.completed { background: #2196F3; }

        .console-controls {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .control-btn.run { background: #4CAF50; }
        .control-btn.run:hover { background: #45a049; }
        .control-btn.stop { background: #f44336; }
        .control-btn.stop:hover { background: #da190b; }
        .control-btn.clear { background: #ff9800; }
        .control-btn.clear:hover { background: #e68900; }

        .console-output {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .console-output .output-line { color: #d4d4d4; }
        .console-output .error-line { color: #f48771; }
        .console-output .success-line { color: #4CAF50; }
        .console-output .info-line { color: #2196F3; }

        .console-output::-webkit-scrollbar {
            width: 8px;
        }

        .console-output::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .console-output::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        .file-info {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .file-info.show {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label { opacity: 0.7; }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .upload-area { padding: 40px 20px; }
            .options { flex-direction: column; }
            .console-output { max-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>🚀 Python Bot Host</h1>
            <p>ارفع بوتك وشغله مباشرة - جميع المكتبات مدعومة</p>
        </div>

        <!-- البطاقة الرئيسية -->
        <div class="main-card">
            <!-- منطقة الرفع -->
            <div class="upload-area" id="upload-area">
                <div class="upload-icon">📁</div>
                <div class="upload-text">اسحب وأفلت ملف البوت هنا</div>
                <div class="upload-hint">أو انقر للاختيار - Python فقط (.py)</div>
                <input type="file" id="file-input" accept=".py">
            </div>

            <!-- معلومات الملف -->
            <div class="file-info" id="file-info">
                <div class="info-row">
                    <span class="info-label">📄 اسم الملف:</span>
                    <span id="file-name">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">📏 الحجم:</span>
                    <span id="file-size">-</span>
                </div>
            </div>

            <!-- الخيارات -->
            <div class="options">
                <div class="option-group">
                    <input type="checkbox" id="auto-run" checked>
                    <label for="auto-run">تشغيل تلقائي بعد الرفع</label>
                </div>
                <div class="option-group">
                    <input type="checkbox" id="install-deps" checked>
                    <label for="install-deps">تثبيت المكتبات تلقائياً</label>
                </div>
            </div>

            <!-- زر الرفع -->
            <button class="upload-btn" id="upload-btn" disabled>
                ⚡ ارفع وشغل البوت
            </button>

            <!-- شريط التقدم -->
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <!-- الكونسول -->
            <div class="console" id="console">
                <div class="console-header">
                    <div class="console-title">
                        <span class="status-dot" id="status-dot"></span>
                        <span>Console Output</span>
                    </div>
                    <div class="console-controls">
                        <button class="control-btn run" id="run-btn" style="display:none;">▶ تشغيل</button>
                        <button class="control-btn stop" id="stop-btn" style="display:none;">⏹ إيقاف</button>
                        <button class="control-btn clear" id="clear-btn">🧹 تنظيف</button>
                    </div>
                </div>
                <div class="console-output" id="console-output">
                    <span class="info-line">📋 في انتظار رفع الملف...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let eventSource = null;

        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInfo = document.getElementById('file-info');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = progressBar.querySelector('.progress-fill');
        const console = document.getElementById('console');
        const consoleOutput = document.getElementById('console-output');
        const statusDot = document.getElementById('status-dot');
        const runBtn = document.getElementById('run-btn');
        const stopBtn = document.getElementById('stop-btn');
        const clearBtn = document.getElementById('clear-btn');
        const autoRunCheck = document.getElementById('auto-run');

        let selectedFile = null;

        // أحداث السحب والإفلات
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.endsWith('.py')) {
                alert('❌ يرجى اختيار ملف Python بصيغة .py فقط');
                return;
            }

            selectedFile = file;
            uploadBtn.disabled = false;
            uploadBtn.textContent = '⚡ ارفع وشغل البوت';
            
            // عرض معلومات الملف
            fileInfo.classList.add('show');
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-size').textContent = formatFileSize(file.size);

            // تحديث منطقة الرفع
            uploadArea.querySelector('.upload-icon').textContent = '🐍';
            uploadArea.querySelector('.upload-text').textContent = file.name;
            uploadArea.querySelector('.upload-hint').textContent = formatFileSize(file.size);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // رفع الملف
        uploadBtn.addEventListener('click', uploadFile);

        async function uploadFile() {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ جاري الرفع...';
            progressBar.style.display = 'block';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('auto_run', autoRunCheck.checked);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    currentTaskId = data.task_id;
                    
                    // إظهار الكونسول
                    console.style.display = 'block';
                    consoleOutput.innerHTML = '';
                    
                    // بدء استقبال المخرجات
                    startOutputStream(currentTaskId);
                    
                    progressFill.style.width = '100%';
                    setTimeout(() => {
                        progressBar.style.display = 'none';
                        progressFill.style.width = '0%';
                    }, 1000);

                    uploadBtn.textContent = '✅ تم الرفع بنجاح';
                    statusDot.className = 'status-dot running';
                    
                    if (!data.auto_run) {
                        runBtn.style.display = 'inline-block';
                    }
                    stopBtn.style.display = 'inline-block';
                    
                } else {
                    alert('❌ ' + (data.error || 'حدث خطأ في الرفع'));
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '⚡ ارفع وشغل البوت';
                    progressBar.style.display = 'none';
                }
            } catch (error) {
                alert('❌ فشل الاتصال بالخادم: ' + error.message);
                uploadBtn.disabled = false;
                uploadBtn.textContent = '⚡ ارفع وشغل البوت';
                progressBar.style.display = 'none';
            }
        }

        function startOutputStream(taskId) {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource(`/output/${taskId}`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'output') {
                    addOutputLine(data.text, 'output-line');
                } else if (data.type === 'error') {
                    addOutputLine(data.text, 'error-line');
                } else if (data.type === 'complete') {
                    addOutputLine('═'.repeat(50), 'info-line');
                    if (data.success) {
                        addOutputLine('✅ تم الانتهاء بنجاح', 'success-line');
                        statusDot.className = 'status-dot completed';
                    } else {
                        addOutputLine('❌ انتهى البوت مع أخطاء', 'error-line');
                        statusDot.className = 'status-dot error';
                    }
                    addOutputLine('═'.repeat(50), 'info-line');
                    
                    stopBtn.style.display = 'none';
                    runBtn.style.display = 'inline-block';
                    
                    eventSource.close();
                }
                
                // تحديث الحالة
                if (data.running) {
                    statusDot.className = 'status-dot running';
                }
            };

            eventSource.onerror = () => {
                console.log('انقطع الاتصال، جاري إعادة المحاولة...');
            };
        }

        function addOutputLine(text, className = 'output-line') {
            const line = document.createElement('div');
            line.className = className;
            line.textContent = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        // أزرار التحكم
        runBtn.addEventListener('click', async () => {
            if (!currentTaskId) return;
            
            try {
                const response = await fetch(`/run/${currentTaskId}`, { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    consoleOutput.innerHTML = '';
                    startOutputStream(currentTaskId);
                    runBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                    statusDot.className = 'status-dot running';
                    addOutputLine('🔄 جاري تشغيل البوت...', 'info-line');
                } else {
                    alert('❌ ' + (data.error || 'فشل التشغيل'));
                }
            } catch (error) {
                alert('❌ فشل الاتصال: ' + error.message);
            }
        });

        stopBtn.addEventListener('click', async () => {
            if (!currentTaskId) return;
            
            if (!confirm('هل أنت متأكد من إيقاف البوت؟')) return;
            
            try {
                const response = await fetch(`/stop/${currentTaskId}`, { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    addOutputLine('\n⛔ تم إيقاف البوت', 'error-line');
                    statusDot.className = 'status-dot error';
                    stopBtn.style.display = 'none';
                    runBtn.style.display = 'inline-block';
                    
                    if (eventSource) {
                        eventSource.close();
                    }
                }
            } catch (error) {
                alert('❌ فشل إيقاف البوت: ' + error.message);
            }
        });

        clearBtn.addEventListener('click', () => {
            if (currentTaskId) {
                fetch(`/cleanup/${currentTaskId}`, { method: 'POST' })
                    .finally(() => {
                        resetAll();
                    });
            } else {
                resetAll();
            }
        });

        function resetAll() {
            currentTaskId = null;
            selectedFile = null;
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⚡ ارفع وشغل البوت';
            fileInfo.classList.remove('show');
            console.style.display = 'none';
            consoleOutput.innerHTML = '<span class="info-line">📋 في انتظار رفع الملف...</span>';
            statusDot.className = 'status-dot';
            runBtn.style.display = 'none';
            stopBtn.style.display = 'none';
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
            
            uploadArea.querySelector('.upload-icon').textContent = '📁';
            uploadArea.querySelector('.upload-text').textContent = 'اسحب وأفلت ملف البوت هنا';
            uploadArea.querySelector('.upload-hint').textContent = 'أو انقر للاختيار - Python فقط (.py)';
            
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }
    </script>
</body>
  </html>
